services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      WEBSOCKET_ENABLED: "true"
      SIGNUPS_ALLOWED: "${VW_SIGNUPS_ALLOWED:-false}"
      ADMIN_TOKEN: "${VW_ADMIN_TOKEN}"
      DOMAIN: "${VW_DOMAIN}"
    volumes:
      - ./vw-data:/data
    ports:
      - "8222:80"
